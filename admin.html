<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shift Motors - Admin</title>
<link rel="stylesheet" href="style.css">
<style>
.admin-container{max-width:800px;margin:100px auto;padding:2rem}
.admin-container h1{margin-bottom:2rem;color:var(--gold)}
.form-group{margin-bottom:1rem}
.form-group label{display:block;font-size:0.85rem;color:var(--text-muted);margin-bottom:0.3rem}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:0.6rem 1rem;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:0.9rem}
.form-group textarea{min-height:100px;resize:vertical}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--gold)}
.btn-save{padding:0.8rem 2rem;background:var(--gold);color:#000;font-weight:700;border:none;border-radius:6px;cursor:pointer;font-size:1rem;margin-top:1rem}
.btn-save:hover{background:var(--gold-light)}
.btn-delete{padding:0.4rem 1rem;background:#e74c3c;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:0.8rem}
.existing-list{margin-top:3rem}
.existing-item{display:flex;align-items:center;justify-content:space-between;padding:1rem;background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:0.8rem}
.existing-item .item-info{flex:1}
.existing-item .item-info h4{margin-bottom:0.2rem}
.existing-item .item-info span{color:var(--text-muted);font-size:0.85rem}
.msg{padding:0.8rem;background:rgba(201,162,39,0.15);border:1px solid var(--gold);border-radius:6px;margin-bottom:1rem;display:none}
</style>
</head>
<body>
<header class="header">
  <div class="header-content">
    <a href="index.html" style="color:var(--gold);text-decoration:none;font-weight:700">Shift Motors</a>
    <span style="color:var(--text-muted)">Painel Admin</span>
  </div>
</header>
<div class="admin-container">
  <h1>Cadastrar Veiculo</h1>
  <div class="msg" id="msg">Veiculo salvo com sucesso!</div>
  <div class="form-group"><label>Marca</label><input id="brand" placeholder="Ex: BMW"></div>
  <div class="form-group"><label>Modelo</label><input id="model" placeholder="Ex: 320i Sport"></div>
  <div class="form-group"><label>Ano</label><input id="year" type="number" placeholder="2024"></div>
  <div class="form-group"><label>Km</label><input id="km" placeholder="28.000"></div>
  <div class="form-group"><label>Preco (R$)</label><input id="price" placeholder="245.900"></div>
  <div class="form-group"><label>Combustivel</label><select id="fuel"><option>Gasolina</option><option>Flex</option><option>Diesel</option><option>Eletrico</option><option>Hibrido</option></select></div>
  <div class="form-group"><label>Cambio</label><select id="transmission"><option>Automatico</option><option>Manual</option><option>CVT</option></select></div>
  <div class="form-group"><label>Cor</label><input id="color" placeholder="Preto"></div>
  <div class="form-group"><label>Portas</label><input id="doors" type="number" value="4"></div>
  <div class="form-group"><label>URL da Imagem</label><input id="image" placeholder="https://..."></div>
  <div class="form-group"><label>Descricao</label><textarea id="description" placeholder="Descreva o veiculo..."></textarea></div>
  <button class="btn-save" onclick="saveVehicle()">Salvar Veiculo</button>

  <div class="existing-list">
    <h2>Veiculos Cadastrados</h2>
    <div id="vehicle-list"></div>
  </div>
</div>
<script>
var vehicles = JSON.parse(localStorage.getItem("shift-vehicles") || "[]");
renderList();

function saveVehicle() {
  var v = {
    brand: document.getElementById("brand").value,
    model: document.getElementById("model").value,
    year: parseInt(document.getElementById("year").value),
    km: document.getElementById("km").value,
    price: document.getElementById("price").value,
    fuel: document.getElementById("fuel").value,
    transmission: document.getElementById("transmission").value,
    color: document.getElementById("color").value,
    doors: parseInt(document.getElementById("doors").value),
    image: document.getElementById("image").value,
    description: document.getElementById("description").value
  };
  if (!v.brand || !v.model) { alert("Preencha marca e modelo"); return; }
  vehicles.push(v);
  localStorage.setItem("shift-vehicles", JSON.stringify(vehicles));
  document.getElementById("msg").style.display = "block";
  setTimeout(function(){ document.getElementById("msg").style.display="none"; }, 3000);
  clearForm();
  renderList();
}

function deleteVehicle(i) {
  vehicles.splice(i, 1);
  localStorage.setItem("shift-vehicles", JSON.stringify(vehicles));
  renderList();
}

function renderList() {
  var el = document.getElementById("vehicle-list");
  el.innerHTML = vehicles.map(function(v,i){
    return '<div class="existing-item"><div class="item-info"><h4>'+v.brand+' '+v.model+'</h4><span>'+v.year+' | '+v.km+' km | R$ '+v.price+'</span></div><button class="btn-delete" onclick="deleteVehicle('+i+')">Remover</button></div>';
  }).join("") || "<p style='color:var(--text-muted)'>Nenhum veiculo cadastrado ainda.</p>";
}

function clearForm() {
  ["brand","model","year","km","price","color","image","description"].forEach(function(id){ document.getElementById(id).value=""; });
}
</script>
</body>
</html>
